{% extends "base.html" %}
{% block content %}

<style>
.to-table td, .to-table th { vertical-align: middle; }
.to-row-past td { opacity: .5; }
.to-reason-badge {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  background: var(--card-bg-deeper);
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
}
.to-add-form {
  display: grid;
  grid-template-columns: auto 1fr 1fr 1fr 1fr auto;
  gap: 8px;
  align-items: end;
  flex-wrap: wrap;
}
@media(max-width:800px) { .to-add-form { grid-template-columns: 1fr 1fr; } }
.to-add-form .field { margin: 0; }
.to-add-form label { font-size: 11px; margin-bottom: 4px; }
.to-days-preview {
  font-size: 11px; font-family: var(--mono);
  color: var(--accent); margin-top: 4px; height: 16px;
}
</style>

<div class="page-project-title">Time Off</div>
<div class="subtle" style="margin-bottom:16px">Log and manage engineer absences for capacity planning</div>

{# ── Filter bar ── #}
<div class="card" style="padding:14px 20px;margin-bottom:10px">
  <div style="display:flex;gap:10px;align-items:end;flex-wrap:wrap">
    <div class="field" style="margin:0;min-width:140px">
      <label>Engineer</label>
      <select id="filter-eng" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px">
        <option value="">All Engineers</option>
        {% for m in team_members %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" style="margin:0">
      <label>From</label>
      <input type="date" id="filter-start" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px" />
    </div>
    <div class="field" style="margin:0">
      <label>To</label>
      <input type="date" id="filter-end" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px" />
    </div>
    <button class="btn btn-primary" id="load-btn" style="padding:7px 18px">Load</button>
  </div>
</div>

{# ── Entries table ── #}
<div class="card" id="to-table-card" style="margin-bottom:14px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <h2 style="margin:0">Absences</h2>
    <div id="to-status" style="font-size:12px;color:var(--good);display:none">✓ Saved</div>
  </div>
  <div id="to-table-wrap">
    <div class="subtle small">Loading…</div>
  </div>
</div>

{# ── Add entry form ── #}
<div class="card">
  <h2 style="margin-top:0">Add Entry</h2>
  <div class="to-add-form" id="to-add-form">
    <div class="field" style="margin:0;min-width:110px">
      <label>Engineer *</label>
      <select id="add-eng" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px">
        <option value="">— Select —</option>
        {% for m in team_members %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" style="margin:0">
      <label>From *</label>
      <input type="date" id="add-start" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px;width:100%" />
      <div class="to-days-preview" id="add-days-preview"></div>
    </div>
    <div class="field" style="margin:0">
      <label>To *</label>
      <input type="date" id="add-end" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px;width:100%" />
    </div>
    <div class="field" style="margin:0;min-width:150px">
      <label>Reason *</label>
      <select id="add-reason" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px">
        {% for r in reasons %}
        <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" style="margin:0;min-width:160px">
      <label>Notes (optional)</label>
      <input type="text" id="add-notes" placeholder="e.g. European trip" style="padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:13px;width:100%" />
    </div>
    <button class="btn btn-primary" id="add-btn" style="padding:7px 18px;white-space:nowrap">+ Add</button>
  </div>
  <div id="add-err" style="font-size:12px;color:var(--bad);margin-top:8px;display:none"></div>
</div>

<script>
(function () {
  var TEAM_COLORS = {{ team_colors | safe }};
  var today = new Date().toISOString().slice(0, 10);

  // Default filter: today → 90 days out
  var defaultEnd = new Date();
  defaultEnd.setDate(defaultEnd.getDate() + 90);
  document.getElementById('filter-start').value = today;
  document.getElementById('filter-end').value = defaultEnd.toISOString().slice(0, 10);

  function countWorkingDays(start, end) {
    var s = new Date(start + 'T00:00:00'), e = new Date(end + 'T00:00:00'), n = 0;
    while (s <= e) { if (s.getDay() >= 1 && s.getDay() <= 5) n++; s.setDate(s.getDate() + 1); }
    return n;
  }

  function dotFor(initials) {
    var color = TEAM_COLORS[initials] || '#888';
    return '<span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:' + color +
           ';color:#fff;font-size:9px;font-weight:800;text-align:center;line-height:20px;vertical-align:middle;margin-right:5px">' +
           initials + '</span>';
  }

  function formatDate(d) {
    if (!d) return '—';
    var parts = d.split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
  }

  function isPast(endDate) {
    return endDate < today;
  }

  function renderTable(rows) {
    var wrap = document.getElementById('to-table-wrap');
    if (!rows.length) {
      wrap.innerHTML = '<div class="subtle small">No time-off entries found for this range.</div>';
      return;
    }
    var html = '<table class="table to-table"><thead><tr>' +
      '<th>Engineer</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Notes</th><th style="width:60px"></th>' +
      '</tr></thead><tbody>';
    rows.forEach(function (r) {
      var past = isPast(r.end_date);
      html += '<tr class="table-row' + (past ? ' to-row-past' : '') + '" data-id="' + r.id + '">' +
        '<td>' + dotFor(r.engineer_initials) + r.engineer_initials + '</td>' +
        '<td style="font-family:var(--mono);font-size:12px">' + formatDate(r.start_date) + '</td>' +
        '<td style="font-family:var(--mono);font-size:12px">' + formatDate(r.end_date) + '</td>' +
        '<td style="font-family:var(--mono);font-weight:700;color:var(--accent)">' + r.working_days + '</td>' +
        '<td><span class="to-reason-badge">' + r.reason + '</span></td>' +
        '<td class="subtle">' + (r.notes || '') + '</td>' +
        '<td><button class="btn delete-to-btn" data-id="' + r.id + '" style="font-size:11px;padding:3px 10px;color:var(--bad);border-color:rgba(255,82,82,.40)">Delete</button></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    wrap.querySelectorAll('.delete-to-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (!confirm('Delete this time-off entry?')) return;
        deleteEntry(parseInt(btn.dataset.id));
      });
    });
  }

  function loadEntries() {
    var eng   = document.getElementById('filter-eng').value;
    var start = document.getElementById('filter-start').value;
    var end   = document.getElementById('filter-end').value;
    var url = '/api/time-off?';
    if (eng)   url += 'engineer=' + encodeURIComponent(eng) + '&';
    if (start) url += 'start=' + encodeURIComponent(start) + '&';
    if (end)   url += 'end=' + encodeURIComponent(end) + '&';
    document.getElementById('to-table-wrap').innerHTML = '<div class="subtle small">Loading…</div>';
    fetch(url)
      .then(r => r.json())
      .then(rows => renderTable(rows))
      .catch(() => {
        document.getElementById('to-table-wrap').innerHTML = '<div class="subtle small">Error loading entries.</div>';
      });
  }

  function deleteEntry(id) {
    fetch('/api/time-off/' + id, { method: 'DELETE' })
      .then(r => { if (r.ok) loadEntries(); else alert('Delete failed.'); })
      .catch(() => alert('Network error.'));
  }

  document.getElementById('load-btn').addEventListener('click', loadEntries);

  // Live working-days preview
  function updateDaysPreview() {
    var s = document.getElementById('add-start').value;
    var e = document.getElementById('add-end').value;
    var el = document.getElementById('add-days-preview');
    if (s && e && e >= s) {
      var n = countWorkingDays(s, e);
      el.textContent = n + ' working day' + (n !== 1 ? 's' : '');
    } else {
      el.textContent = '';
    }
  }
  document.getElementById('add-start').addEventListener('change', updateDaysPreview);
  document.getElementById('add-end').addEventListener('change', updateDaysPreview);

  // Add entry
  document.getElementById('add-btn').addEventListener('click', function () {
    var eng    = document.getElementById('add-eng').value.trim();
    var start  = document.getElementById('add-start').value;
    var end    = document.getElementById('add-end').value;
    var reason = document.getElementById('add-reason').value;
    var notes  = document.getElementById('add-notes').value.trim();
    var errEl  = document.getElementById('add-err');
    errEl.style.display = 'none';
    if (!eng) { errEl.textContent = 'Engineer is required.'; errEl.style.display = 'block'; return; }
    if (!start || !end) { errEl.textContent = 'From and To dates are required.'; errEl.style.display = 'block'; return; }
    if (end < start) { errEl.textContent = 'To date must be on or after From date.'; errEl.style.display = 'block'; return; }
    var btn = document.getElementById('add-btn');
    btn.disabled = true;
    fetch('/api/time-off', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ engineer_initials: eng, start_date: start, end_date: end, reason: reason, notes: notes || null }),
    })
      .then(r => r.json().then(data => ({ ok: r.ok, data })))
      .then(({ ok, data }) => {
        if (!ok) { errEl.textContent = data.detail || 'Error adding entry.'; errEl.style.display = 'block'; return; }
        // Reset form
        document.getElementById('add-eng').value = '';
        document.getElementById('add-start').value = '';
        document.getElementById('add-end').value = '';
        document.getElementById('add-reason').value = '{{ reasons[0] }}';
        document.getElementById('add-notes').value = '';
        document.getElementById('add-days-preview').textContent = '';
        // Show saved indicator briefly
        var st = document.getElementById('to-status');
        st.style.display = 'inline'; setTimeout(() => st.style.display = 'none', 2000);
        loadEntries();
      })
      .catch(() => { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; })
      .finally(() => { btn.disabled = false; });
  });

  loadEntries();
})();
</script>

{% endblock %}
