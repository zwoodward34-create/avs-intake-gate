{% extends "base.html" %}
{% block content %}
<style>

  .ts-header { font-size:22px; font-weight:900; letter-spacing:-.3px; color:var(--text); margin-bottom:6px }
  .ts-sub { font-size:13px; color:var(--muted) }

  /* Control bar */
  .ts-controls {
    display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;
    background:var(--card-bg); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; margin-bottom:16px;
  }
  .ts-controls .field { margin:0; flex:1; min-width:140px; max-width:200px }
  .ts-controls label { color:var(--muted); font-size:10px }
  .ts-controls input, .ts-controls select {
    background:rgba(0,0,0,0.25); border-color:rgba(255,255,255,0.1); color:var(--text);
    font-size:13px;
  }
  .ts-controls input:focus, .ts-controls select:focus { border-color:rgba(0,230,118,.45) }

  /* Entry table */
  .ts-card {
    background:var(--card-bg); border:1px solid var(--border); border-radius:8px;
    overflow:hidden; margin-bottom:16px;
  }
  .ts-table { width:100%; border-collapse:collapse; font-size:13px }
  .ts-table th {
    padding:10px 12px; text-align:left; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:.6px; color:var(--muted);
    background:var(--card-bg-deeper); border-bottom:1px solid var(--border);
  }
  .ts-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle }
  .ts-table tr:last-child td { border-bottom:none }
  .ts-table tr:hover td { background:rgba(255,255,255,0.03) }

  .date-group-row td {
    background:var(--card-bg-deeper); color:var(--muted); font-size:11px;
    font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    padding:6px 12px; border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .date-total { float:right; font-family:'JetBrains Mono',monospace }

  .phase-dot {
    display:inline-block; width:8px; height:8px; border-radius:2px;
    margin-right:5px; vertical-align:middle; flex-shrink:0;
  }
  .ts-hours { font-family:'JetBrains Mono',monospace; font-weight:700 }
  .ts-date  { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted) }

  .ts-total-row td {
    border-top:2px solid rgba(255,255,255,0.12); font-weight:700;
    color:var(--text); padding:12px;
  }
  .ts-empty { text-align:center; padding:40px; color:var(--muted); font-size:13px }

  /* Add form */
  .ts-add-form {
    background:var(--card-bg); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; margin-bottom:16px;
  }
  .ts-add-form .form-row {
    display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end;
  }
  .ts-add-form .field { margin:0; flex:1; min-width:110px }
  .ts-add-form label { color:var(--muted); font-size:10px }
  .ts-add-form input, .ts-add-form select {
    background:rgba(0,0,0,0.25); border-color:rgba(255,255,255,0.1); color:var(--text);
    font-size:13px;
  }
  .ts-add-form input:focus, .ts-add-form select:focus { border-color:rgba(0,230,118,.45) }

  /* Edit row */
  .edit-row td { background:rgba(0,230,118,0.05) !important }
  .edit-row input {
    background:rgba(0,0,0,0.25); border:1px solid rgba(0,230,118,.35); color:var(--text);
    border-radius:3px; padding:4px 8px; font-size:12px; font-family:'JetBrains Mono',monospace;
  }

  /* Action btns */
  .btn-ts-edit { font-size:11px; padding:3px 8px; color:#60a5fa; border-color:rgba(96,165,250,.3); background:rgba(96,165,250,.07) }
  .btn-ts-edit:hover { background:rgba(96,165,250,.14) }
  .btn-ts-del  { font-size:11px; padding:3px 8px; color:#f87171; border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.07) }
  .btn-ts-del:hover { background:rgba(248,113,113,.14) }
  .btn-ts-save { font-size:11px; padding:3px 8px; color:#4ade80; border-color:rgba(74,222,128,.3); background:rgba(74,222,128,.07) }
  .btn-ts-save:hover { background:rgba(74,222,128,.14) }

  /* Submission banner */
  .ts-submit-banner {
    background:var(--card-bg); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .ts-submit-banner.status-draft    { border-color:rgba(255,255,255,0.1) }
  .ts-submit-banner.status-submitted { border-color:rgba(251,191,36,.5); background:rgba(251,191,36,.05) }
  .ts-submit-banner.status-approved  { border-color:rgba(74,222,128,.5);  background:rgba(74,222,128,.05) }
  .ts-submit-banner.status-rejected  { border-color:rgba(248,113,113,.5); background:rgba(248,113,113,.05) }
  .ts-submit-info { flex:1; min-width:200px }
  .ts-submit-status-badge {
    display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; padding:2px 8px; border-radius:20px; margin-left:8px;
  }
  .badge-draft     { background:rgba(156,163,175,.15); color:#9ca3af }
  .badge-submitted { background:rgba(251,191,36,.15);  color:#fbbf24 }
  .badge-approved  { background:rgba(74,222,128,.15);  color:#4ade80 }
  .badge-rejected  { background:rgba(248,113,113,.15); color:#f87171 }
  .ts-submit-label { font-size:13px; font-weight:700; color:var(--text) }
  .ts-submit-meta  { font-size:11px; color:var(--muted); margin-top:2px }
  .ts-lock-row td  { opacity:0.45 }
  .ts-lock-icon    { font-size:11px; color:var(--muted); margin-left:4px }
</style>

<div class="ts-header">Timesheet</div>
<div class="ts-sub" style="margin-bottom:16px">Log hours against active projects by engineer and phase</div>

<!-- Control bar -->
<div class="ts-controls">
  <div class="field">
    <label>Engineer</label>
    <select id="eng-select">
      <option value="">— All Engineers —</option>
      {% for m in team_members %}
        <option value="{{ m }}">{{ m }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Period Start</label>
    <input type="date" id="period-start" value="{{ default_period_start }}" />
  </div>
  <div class="field">
    <label>Period End</label>
    <input type="date" id="period-end" value="{{ default_period_end }}" />
  </div>
  <button class="btn btn-primary" type="button" onclick="loadEntries()" style="flex:0 0 auto; white-space:nowrap">
    Load Entries
  </button>
</div>

<!-- Submission Banner -->
<div id="ts-submit-banner" style="display:none"></div>

<!-- Add Entry Form -->
<div class="ts-add-form">
  <div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:10px">Add Time Entry</div>
  <div class="form-row">
    <div class="field" style="min-width:90px; max-width:110px">
      <label>Engineer *</label>
      <select id="add-eng">
        <option value="">—</option>
        {% for m in team_members %}
          <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" style="min-width:160px; max-width:240px">
      <label>Project *</label>
      <select id="add-project" onchange="onProjectChange()">
        <option value="">— Select project —</option>
      </select>
    </div>
    <div class="field" style="min-width:90px; max-width:120px">
      <label>Phase *</label>
      <select id="add-phase">
        <option value="">—</option>
        {% for p in valid_phases %}
          <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" style="min-width:130px; max-width:160px">
      <label>Date *</label>
      <input type="date" id="add-date" value="{{ now_local[:10] }}" />
    </div>
    <div class="field" style="min-width:80px; max-width:100px">
      <label>Hours *</label>
      <input type="number" id="add-hours" min="0.5" max="24" step="0.5" placeholder="0.0" />
    </div>
    <div class="field" style="min-width:160px">
      <label>Notes</label>
      <input type="text" id="add-notes" placeholder="Optional" />
    </div>
    <button class="btn btn-primary" type="button" onclick="addEntry()" id="add-btn"
            style="flex:0 0 auto; white-space:nowrap">+ Add</button>
  </div>
  <div id="add-error" style="display:none; color:#f87171; font-size:12px; margin-top:6px; font-weight:600"></div>
</div>

<!-- Entry Table -->
<div class="ts-card">
  <div id="ts-table-wrap">
    <div class="ts-empty">Select an engineer and period, then click Load Entries.</div>
  </div>
</div>

<script>
(function() {
  const PHASE_COLORS    = {{ phase_colors_json | safe }};
  const TEAM_FULL_NAMES = {{ team_full_names_json | safe }};
  var activeProjects = [];  // [{intake_id, project_number, client, project_name, phases}]

  // Load projects when engineer changes
  document.getElementById('add-eng').addEventListener('change', function() {
    loadActiveProjects(this.value);
  });

  function loadActiveProjects(eng) {
    var url = '/api/active-projects' + (eng ? '?engineer=' + eng : '');
    fetch(url).then(r => r.json()).then(data => {
      activeProjects = data;
      var sel = document.getElementById('add-project');
      sel.innerHTML = '<option value="">— Select project —</option>';
      data.forEach(p => {
        var opt = document.createElement('option');
        opt.value = p.project_number;
        opt.dataset.intakeId = p.intake_id || '';
        opt.dataset.phases   = JSON.stringify(p.phases || []);
        opt.textContent = p.project_number + ' — ' + (p.project_name || p.client || p.project_number);
        sel.appendChild(opt);
      });
    }).catch(() => {});
  }

  window.onProjectChange = function() {
    var sel = document.getElementById('add-project');
    var opt = sel.options[sel.selectedIndex];
    var phases = [];
    try { phases = JSON.parse(opt.dataset.phases || '[]'); } catch(e) {}

    var phSel = document.getElementById('add-phase');
    phSel.innerHTML = '<option value="">—</option>';
    var allPhases = Object.keys(PHASE_COLORS);
    var list = phases.length ? phases : allPhases;
    list.forEach(p => {
      var o = document.createElement('option');
      o.value = p; o.textContent = p;
      phSel.appendChild(o);
    });
    if (list.length === 1) phSel.value = list[0];
  };

  // ── Submission status ────────────────────────────────────────────────────────
  var _lockedPeriod = false;

  function loadSubmissionStatus(eng, start, end) {
    var banner = document.getElementById('ts-submit-banner');
    if (!eng) { banner.style.display = 'none'; _lockedPeriod = false; return; }
    fetch('/api/timesheet/submission?engineer=' + eng + '&start=' + start + '&end=' + end)
      .then(r => r.json())
      .then(sub => renderSubmissionBanner(sub, eng, start, end))
      .catch(() => { banner.style.display = 'none'; });
  }

  function renderSubmissionBanner(sub, eng, start, end) {
    var banner = document.getElementById('ts-submit-banner');
    var status = (sub.status || 'DRAFT').toUpperCase();
    _lockedPeriod = (status === 'SUBMITTED' || status === 'APPROVED');

    var badgeClass = { DRAFT:'badge-draft', SUBMITTED:'badge-submitted', APPROVED:'badge-approved', REJECTED:'badge-rejected' }[status] || 'badge-draft';
    var statusClass = status.toLowerCase();

    var metaLine = '';
    if (status === 'SUBMITTED' && sub.submitted_at) {
      metaLine = 'Submitted ' + new Date(sub.submitted_at).toLocaleDateString();
    } else if (status === 'APPROVED' && sub.reviewed_at) {
      metaLine = 'Approved ' + new Date(sub.reviewed_at).toLocaleDateString();
      if (sub.reviewer_notes) metaLine += ' · ' + sub.reviewer_notes;
    } else if (status === 'REJECTED' && sub.reviewer_notes) {
      metaLine = 'Rejected · ' + sub.reviewer_notes;
    } else if (status === 'DRAFT') {
      metaLine = 'Not yet submitted for review';
    }

    var hoursLine = sub.total_hours != null ? sub.total_hours.toFixed(1) + ' h' : '';

    var actionHtml = '';
    if (status === 'DRAFT' || status === 'REJECTED') {
      actionHtml = `<button class="btn btn-primary" type="button" onclick="submitPeriod('${eng}','${start}','${end}')" style="white-space:nowrap;font-size:12px">Submit for Review</button>`;
    } else if (status === 'SUBMITTED') {
      actionHtml = `<span style="font-size:12px;color:var(--warn)">⏳ Awaiting approval</span>`;
    } else if (status === 'APPROVED') {
      actionHtml = `<span style="font-size:12px;color:var(--good)">✓ Period locked</span>`;
    }

    banner.className = 'ts-submit-banner status-' + statusClass;
    banner.innerHTML = `
      <div class="ts-submit-info">
        <div class="ts-submit-label">
          Pay Period ${start} – ${end}
          <span class="ts-submit-status-badge ${badgeClass}">${status}</span>
          ${hoursLine ? '<span style="font-size:11px;color:var(--muted);margin-left:8px">' + hoursLine + '</span>' : ''}
        </div>
        <div class="ts-submit-meta">${metaLine}</div>
      </div>
      <div>${actionHtml}</div>`;
    banner.style.display = 'flex';
  }

  window.submitPeriod = function(eng, start, end) {
    fetch('/api/timesheet/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({engineer: eng, period_start: start, period_end: end}),
    })
    .then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.detail || 'Submit failed'); }); return r.json(); })
    .then(sub => { renderSubmissionBanner(sub, eng, start, end); loadEntries(); })
    .catch(e => alert(e.message));
  };

  // Load entries table
  window.loadEntries = function() {
    var eng   = document.getElementById('eng-select').value;
    var start = document.getElementById('period-start').value;
    var end   = document.getElementById('period-end').value;
    if (!start || !end) { alert('Please select a date range.'); return; }

    document.getElementById('ts-table-wrap').innerHTML =
      '<div class="ts-empty">Loading…</div>';

    loadSubmissionStatus(eng, start, end);

    var params = new URLSearchParams({start, end});
    if (eng) params.append('engineer', eng);

    fetch('/api/time-entries?' + params.toString())
      .then(r => r.json())
      .then(entries => renderTable(entries))
      .catch(() => {
        document.getElementById('ts-table-wrap').innerHTML =
          '<div class="ts-empty">Could not load entries.</div>';
      });
  };

  function renderTable(entries) {
    var wrap = document.getElementById('ts-table-wrap');
    if (!entries.length) {
      wrap.innerHTML = '<div class="ts-empty">No entries found for this period.</div>';
      return;
    }

    // Group by date
    var byDate = {};
    entries.forEach(e => {
      if (!byDate[e.entry_date]) byDate[e.entry_date] = [];
      byDate[e.entry_date].push(e);
    });

    var totalHours = entries.reduce((s, e) => s + parseFloat(e.hours), 0);

    var html = '<table class="ts-table"><thead><tr>' +
      '<th>Date</th><th>Engineer</th><th>Project</th><th>Phase</th>' +
      '<th>Hours</th><th>Notes</th><th></th></tr></thead><tbody id="ts-tbody">';

    Object.keys(byDate).sort().forEach(dt => {
      var dayEntries = byDate[dt];
      var dayTotal = dayEntries.reduce((s, e) => s + parseFloat(e.hours), 0);
      html += `<tr class="date-group-row"><td colspan="7">
        ${dt}<span class="date-total">${dayTotal.toFixed(1)} h</span></td></tr>`;
      dayEntries.forEach(e => {
        html += entryRow(e);
      });
    });

    html += `</tbody><tfoot><tr class="ts-total-row">
      <td colspan="4" style="font-family:'JetBrains Mono',monospace">TOTAL</td>
      <td class="ts-hours" style="font-size:15px">${totalHours.toFixed(1)} h</td>
      <td colspan="2"></td></tr></tfoot></table>`;

    wrap.innerHTML = html;
  }

  function phaseTag(phase) {
    var color = PHASE_COLORS[phase] || '#9ca3af';
    return `<span class="phase-dot" style="background:${color}"></span>${phase}`;
  }

  function entryRow(e) {
    var locked = _lockedPeriod;
    var rowClass = locked ? 'ts-entry-row ts-lock-row' : 'ts-entry-row';
    var actionCell = locked
      ? `<td><span class="ts-lock-icon">🔒</span></td>`
      : `<td style="white-space:nowrap">
           <button class="btn btn-ts-edit" type="button" onclick="startEdit(${e.id})">Edit</button>
           <button class="btn btn-ts-del" type="button" onclick="deleteEntry(${e.id})" style="margin-left:4px">Del</button>
         </td>`;
    return `<tr class="${rowClass}" id="row-${e.id}" data-entry='${JSON.stringify(e)}'>
      <td class="ts-date">${e.entry_date}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.engineer_initials}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.project_number}</td>
      <td>${phaseTag(e.phase_code)}</td>
      <td class="ts-hours">${parseFloat(e.hours).toFixed(1)} h</td>
      <td style="color:var(--muted);font-size:12px">${e.notes || ''}</td>
      ${actionCell}</tr>`;
  }

  // Add entry
  window.addEntry = function() {
    var eng   = document.getElementById('add-eng').value;
    var pn    = document.getElementById('add-project').value;
    var phase = document.getElementById('add-phase').value;
    var dt    = document.getElementById('add-date').value;
    var hrs   = parseFloat(document.getElementById('add-hours').value);
    var notes = document.getElementById('add-notes').value.trim();
    var errEl = document.getElementById('add-error');
    errEl.style.display = 'none';

    if (!eng || !pn || !phase || !dt || isNaN(hrs) || hrs <= 0) {
      errEl.textContent = 'Engineer, project, phase, date, and hours are required.';
      errEl.style.display = 'block';
      return;
    }

    var sel = document.getElementById('add-project');
    var opt = sel.options[sel.selectedIndex];
    var intakeId = opt && opt.dataset.intakeId ? parseInt(opt.dataset.intakeId) : null;

    var btn = document.getElementById('add-btn');
    btn.disabled = true; btn.textContent = 'Adding…';

    fetch('/api/time-entries', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        engineer_initials: eng,
        project_number: pn,
        intake_id: intakeId || null,
        phase_code: phase,
        entry_date: dt,
        hours: hrs,
        notes: notes || null,
      }),
    })
    .then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.detail || 'Add failed') }); return r.json(); })
    .then(() => {
      // Clear form fields (but keep engineer + project)
      document.getElementById('add-hours').value = '';
      document.getElementById('add-notes').value = '';
      loadEntries();
    })
    .catch(e => { errEl.textContent = e.message; errEl.style.display = 'block'; })
    .finally(() => { btn.disabled = false; btn.textContent = '+ Add'; });
  };

  // Edit entry
  window.startEdit = function(id) {
    var row = document.getElementById('row-' + id);
    if (!row) return;
    var e = JSON.parse(row.dataset.entry);
    row.className = 'ts-entry-row edit-row';
    row.innerHTML = `
      <td class="ts-date">${e.entry_date}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.engineer_initials}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.project_number}</td>
      <td>${phaseTag(e.phase_code)}</td>
      <td><input type="number" id="edit-hrs-${id}" min="0.5" max="24" step="0.5" value="${e.hours}" style="width:64px" /></td>
      <td><input type="text" id="edit-notes-${id}" value="${e.notes || ''}" style="width:140px" /></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ts-save" type="button" onclick="saveEdit(${id})">Save</button>
        <button class="btn btn-ts-edit" type="button" onclick="cancelEdit(${id})" style="margin-left:4px">Cancel</button>
      </td>`;
    document.getElementById('edit-hrs-' + id).focus();
    document.getElementById('edit-hrs-' + id).addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') saveEdit(id);
      if (ev.key === 'Escape') cancelEdit(id);
    });
  };

  window.saveEdit = function(id) {
    var hrs   = parseFloat(document.getElementById('edit-hrs-' + id).value);
    var notes = document.getElementById('edit-notes-' + id).value.trim();
    if (isNaN(hrs) || hrs <= 0) { alert('Enter valid hours.'); return; }
    fetch('/api/time-entries/' + id, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({hours: hrs, notes: notes || null}),
    })
    .then(r => { if (!r.ok) throw new Error('Save failed'); return r.json(); })
    .then(() => loadEntries())
    .catch(e => alert(e.message));
  };

  window.cancelEdit = function(id) {
    loadEntries();
  };

  window.deleteEntry = function(id) {
    if (!confirm('Delete this time entry?')) return;
    fetch('/api/time-entries/' + id, {method: 'DELETE'})
      .then(r => { if (!r.ok) throw new Error('Delete failed'); return r.json(); })
      .then(() => loadEntries())
      .catch(e => alert(e.message));
  };

  // Initial load
  loadActiveProjects('');
  loadEntries();
})();
</script>

{% endblock %}
